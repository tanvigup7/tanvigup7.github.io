/* =====================
          NAV
===================== */

.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;

  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 18px 28px;

  background: rgba(0, 0, 0, 0.65); /* darker = grounded */
  backdrop-filter: blur(14px);

  border-bottom: 1px solid rgba(255, 255, 255, 0.06);

  z-index: 10001;
}

/* LEFT IDENTITY */
.logo {
 display: flex
}

.logo a { 
  font-family: monospace;
  font-size: clamp(0.8rem, 1.2vw, 1rem);

  color: rgba(255, 255, 255, 0.75);
  letter-spacing: 1px;
  text-decoration: none;
}

.prompt {
  color: #65ff8f;
  margin-right: 6px;
}

/* RIGHT NAV LINKS */

/* NAV ITEM WRAPPER */

.nav-item {
  position: relative;
  display: inline-block;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: clamp(0.75rem, 2vw, 1.5rem);
}


/* SOCIAL ICONS */

.social-icons {

  display: flex;
  align-items: center;
  gap: clamp(0.4rem, 1vw, 0.9rem);
}


.social-icons a {

  color:
    rgba(255,255,255,0.42);

  transition:
    transform 0.25s ease,
    color 0.25s ease,
    opacity 0.25s ease;
}


.social-icons a:hover {

  color: white;

  transform:
    translateY(-2px)
    scale(1.08);
}


/* ICON SIZE */

.social-icons svg {

  width: 17px;
  height: 17px;

  display: block;
}

.social-icons a:last-child svg {
  top: -3px;
  position: relative;
}
/* DROPDOWN BOX */

.dropdown {
  position: absolute;

  top: 120%;
  left: 0;

  min-width: 160px;

  display: flex;
  flex-direction: column;

  padding: 10px;

  gap: 8px;

  background: rgba(10,10,10,0.9);

  border: 1px solid rgba(255,255,255,0.08);

  backdrop-filter: blur(12px);

  border-radius: 10px;

  opacity: 0;
  transform: translateY(-8px);

  pointer-events: none;

  transition: all 0.2s ease;

  z-index: 9999;
}

/* SHOW ON HOVER */

.nav-item:hover .dropdown {
  opacity: 1;
  transform: translateY(0);

  pointer-events: auto;
}

/* DROPDOWN LINKS */

.dropdown a {
  font-size: 13px;
  color: rgba(255,255,255,0.6);

  text-decoration: none;

  transition: 0.2s ease;
}

.dropdown a:hover {
  color: white;
  transform: translateX(4px);
}


.nav-links {
  display: flex;
  gap: clamp(0.4rem, 1.2vw, 1rem);
}

.nav-links a {
  font-family: monospace;
  font-size: clamp(0.7rem, 0.9vw, 0.9rem);
  color: rgba(255, 255, 255, 0.4);

  text-decoration: none;

  padding: 6px 10px;
  border-radius: 6px;

  border: 1px solid transparent;

  transition: all 0.2s ease;
}

.nav-links a:hover {
  color: rgba(255, 255, 255, 0.9);

  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.1);

  transform: translateY(-1px);
}

/* ===== CAROUSEL ===== */

.gallery-section {
  position: relative;
  padding: 80px 0;
  background:#000;
  overflow:hidden;
}

.top-decoration {
  position: absolute;
    width: 150px; /* Adjust size as needed */
  height: auto;
  z-index: 5;
  /* Remove mix-blend-mode if the background is black, 
     or use 'screen' if you want them to look ghost-like */
}

.chain {
  left: 10%;
  top: -5%;
width: 70px; 
padding: 0px;
  height: auto;
  z-index: 5;
  transition: transform 0.3s ease;
}

.chain:hover {
  cursor: pointer;
  transform: rotate(-5deg) skew(-5deg) scale(1.1);
  z-index: 15; /* Optional: brings it to the front on hover */
}
.fella {
  position: absolute; /* MUST have this for 'right' and 'z-index' to work */
  right: 0;
  top: 30px;         /* Adjust this based on where you want it */
  width: 300px; 
  padding: 10px;
  height: auto;
  z-index: 5;
  transition: transform 0.3s ease; /* Transition the specific property for smoothness */
}

/* Change .fella-hover to .fella:hover */
.fella:hover {
  cursor: pointer;
  transform: rotate(-5deg) skew(-5deg) scale(1.1);
  z-index: 15; /* Optional: brings it to the front on hover */
}

.slide {
  flex: 0 0 400px; /* Keeps your gallery images at a fixed desktop size */
  scroll-snap-align: left;
}

/* horizontal cinematic scroll */
.gallery {
  display: flex;
  gap: 40px;
  padding: 0 10vw;
  overflow-x: scroll; /* Changed to scroll to ensure interaction */
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  cursor: grab;

  -ms-overflow-style: none;
  scrollbar-width: none;
}
.gallery::-webkit-scrollbar {
  display: none;
}

.gallery:active {
  cursor: grabbing;
}

/* slides */
.slide {
  flex: 0 50 150px; /* Small "OG" thumbnail size */
  cursor: pointer;
   width: 70vw;    /* Shows one main image and a peek of the next */
  scroll-snap-align: center;
  margin: 0;
}

.slide img {
  width: 250px;
  height: auto;
  object-fit: contain; /* Keeps them as perfect squares */
  transition: transform 0.3s ease, filter 0.3s;
}

.slide:hover img {
  border: 4px solid #65ff8f;;
}

/* hide scrollbar */
.gallery::-webkit-scrollbar {
  display: none;
}
/* WRITING */

.writing {
    position:relative;
    min-height:auto;
    padding:70px 50px 0px;
    background:#050505;
    overflow:hidden;
}


.writing-header {
    max-width:900px;
    margin-bottom:30px;
}


.writing h1 {
    font-size:90px;
    font-weight:500;
    color:#fff;
    margin:0px 0;
}


.writing-header p {
    color:#888;
    max-width:600px;
    line-height:1.8;
    font-size:15px;
}

.cursor {
    display:inline-block;
    color:#888;
    animation:blink .8s infinite;
}

/* card grid */

.writing-list {
    display:grid;
    grid-template-columns:
    repeat(auto-fit, minmax(280px, 1fr));
    gap:25px;
    max-width:1100px;
    z-index:2;
}



/* cards */

.writing-entry {
    min-height:160px;
    padding:15px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    text-decoration:none;
    color:white;
    background:#080808;
    border:1px solid #222;
    transition:.35s ease;
    position:relative;
}



.writing-entry:hover {
    transform:translateY(-8px);
    border-color:#65ff8f;
    background:#0b0b0b;
}



/* little terminal corner */

.writing-entry::before {

    content:"FILE://";
    position:absolute;
    top:12px;
    right:15px;
    color:#333;
    font-size:10px;
    letter-spacing:2px;
}



.type {

    color:#65ff8f;
    font-size:11px;
    letter-spacing:2px;
    text-transform:uppercase;
}



.writing-entry h2 {
    margin:20px 0 12px;
    font-size:24px;
    font-weight:500;
}



.writing-entry p {
    color:#777;
    line-height:1.7;
    font-size:14px;
}



.arrow {
    color:#555;
    font-size:28px;
    align-self:flex-end;
    transition:.3s;
}



.writing-entry:hover .arrow {
    color:#65ff8f;
    transform:translateX(8px);
}

.writing-art {
    position:absolute;
    right:0px;
    bottom:0px;
    width:clamp(240px, 28vw, 480px);
    height:auto;
    opacity:.7;
    z-index:0;
    pointer-events:none;

}

@keyframes blink {
    50% {
        opacity:0;
    }
}

.dj {
    position:relative;
    min-height:600px;
    padding:70px 50px 150px;

.section {

    top: 0;
    right: 0;
    bottom: 0;

    height: 100%;
    width: auto;

    pointer-events: none;
    z-index: 0;
    opacity: .7;
}

<script>

const text =
"> word vomit essays, poems, and fragments from a creative mind";

const subtitle =
document.getElementById("writing-subtitle");


let i = 0;


function typeWriting(){

    if(i < text.length){

        subtitle.textContent += text.charAt(i);

        i++;

        setTimeout(typeWriting,45);

    }
    else {

        subtitle.innerHTML +=
        '<span class="cursor">_</span>';

    }

}


typeWriting();

</script>
